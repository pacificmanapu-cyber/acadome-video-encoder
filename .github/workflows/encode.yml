name: AcaDome Video Encoder

on:
  repository_dispatch:
    types: [encode_video]
  workflow_dispatch:
    inputs:
      video_url:
        description: 'URL of the source video'
        required: true
      file_name:
        description: 'Output file name (identifier)'
        required: true
      user_id:
        description: 'User ID for storage organization'
        required: true
      context:
        description: 'Context of the video (post or chat)'
        required: false
        default: 'post'

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg openssl bc jq

      - name: Download Source Video
        run: |
          wget -O input_video.mp4 "${{ github.event.client_payload.video_url || github.event.inputs.video_url }}"

      - name: Process Video
        env:
          MODE: ${{ (github.event.client_payload.context == 'chat') && 'compress' || 'hls' }}
        run: |
          chmod +x scripts/process.sh
          ./scripts/process.sh input_video.mp4 "${{ github.event.client_payload.file_name || github.event.inputs.file_name }}"

      - name: Setup AWS CLI
        run: |
          # R2 (for deleting original + uploading thumbnail/metadata)
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }} --profile r2
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }} --profile r2
          aws configure set default.region auto --profile r2

          # B2 (for HLS upload)
          aws configure set aws_access_key_id ${{ secrets.B2_ACCESS_KEY_ID }} --profile b2
          aws configure set aws_secret_access_key ${{ secrets.B2_SECRET_ACCESS_KEY }} --profile b2
          aws configure set default.region us-west-004 --profile b2

          # E2 (for archive upload)
          aws configure set aws_access_key_id ${{ secrets.E2_ACCESS_KEY_ID }} --profile e2
          aws configure set aws_secret_access_key ${{ secrets.E2_SECRET_ACCESS_KEY }} --profile e2
          aws configure set default.region ap-southeast-1 --profile e2

      - name: Upload HLS to B2 (Streaming Storage)
        if: github.event.client_payload.context != 'chat'
        env:
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_BUCKET: ${{ secrets.B2_BUCKET_NAME }}
          USER_ID: ${{ github.event.client_payload.user_id || github.event.inputs.user_id }}
          FILE_NAME: ${{ github.event.client_payload.file_name || github.event.inputs.file_name }}
        run: |
          HLS_PATH="users/$USER_ID/videos/$FILE_NAME/hls"
          echo "Uploading HLS segments to B2: $HLS_PATH"
          
          aws s3 sync output/$FILE_NAME/ s3://$B2_BUCKET/$HLS_PATH/ \
            --endpoint-url $B2_ENDPOINT \
            --profile b2 \
            --exclude "*" \
            --include "*.ts" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "video/MP2T"

          aws s3 sync output/$FILE_NAME/ s3://$B2_BUCKET/$HLS_PATH/ \
            --endpoint-url $B2_ENDPOINT \
            --profile b2 \
            --exclude "*" \
            --include "*.m3u8" \
            --cache-control "public, max-age=3600, s-maxage=86400" \
            --content-type "application/vnd.apple.mpegurl"

          aws s3 cp output/$FILE_NAME/video.key s3://$B2_BUCKET/$HLS_PATH/video.key \
            --endpoint-url $B2_ENDPOINT \
            --profile b2 \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/octet-stream"

      - name: Upload Compressed Archive to E2 (Original Store)
        env:
          E2_ENDPOINT: ${{ secrets.E2_ENDPOINT }}
          E2_BUCKET: ${{ secrets.E2_BUCKET_NAME }}
          USER_ID: ${{ github.event.client_payload.user_id || github.event.inputs.user_id }}
          FILE_NAME: ${{ github.event.client_payload.file_name || github.event.inputs.file_name }}
          CONTEXT: ${{ github.event.client_payload.context || 'post' }}
        run: |
          if [ "$CONTEXT" == "chat" ]; then
            ARCHIVE_KEY="users/$USER_ID/chat/videos/$FILE_NAME/compressed.mp4"
          else
            ARCHIVE_KEY="users/$USER_ID/videos/$FILE_NAME/compressed.mp4"
          fi
          
          echo "Uploading compressed archive to E2: $ARCHIVE_KEY"
          aws s3 cp output/$FILE_NAME/archive/compressed.mp4 \
            s3://$E2_BUCKET/$ARCHIVE_KEY \
            --endpoint-url $E2_ENDPOINT \
            --profile e2 \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "video/mp4"

      - name: Upload Thumbnail & Metadata to R2 (Hot Files)
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          USER_ID: ${{ github.event.client_payload.user_id || github.event.inputs.user_id }}
          FILE_NAME: ${{ github.event.client_payload.file_name || github.event.inputs.file_name }}
        run: |
          CONTEXT=${{ github.event.client_payload.context || 'post' }}
          if [ "$CONTEXT" == "chat" ]; then
            BASE_PATH="users/$USER_ID/chat/videos/$FILE_NAME"
          else
            BASE_PATH="users/$USER_ID/videos/$FILE_NAME"
          fi
          
          if [ -f output/$FILE_NAME/thumbnail.jpg ]; then
            aws s3 cp output/$FILE_NAME/thumbnail.jpg \
              s3://$R2_BUCKET/$BASE_PATH/thumbnail.jpg \
              --endpoint-url $R2_ENDPOINT \
              --profile r2 \
              --cache-control "public, max-age=31536000, immutable" \
              --content-type "image/jpeg"
          fi

          # Metadata stays in R2 (hot file)
          if [ -f output/$FILE_NAME/metadata.json ]; then
            aws s3 cp output/$FILE_NAME/metadata.json \
              s3://$R2_BUCKET/$BASE_PATH/metadata.json \
              --endpoint-url $R2_ENDPOINT \
              --profile r2 \
              --cache-control "public, max-age=3600" \
              --content-type "application/json"
            echo "Metadata uploaded to R2."
          fi

      - name: Purge Cache and Cleanup Raw R2 Files
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          USER_ID: ${{ github.event.client_payload.user_id || github.event.inputs.user_id }}
          FILE_NAME: ${{ github.event.client_payload.file_name || github.event.inputs.file_name }}
        run: |
          CONTEXT=${{ github.event.client_payload.context || 'post' }}
          echo "Deleting raw original file and intermediate part files from R2..."
          if [ "$CONTEXT" == "chat" ]; then
            BASE="users/$USER_ID/chat/videos/$FILE_NAME"
          else
            BASE="users/$USER_ID/videos/$FILE_NAME"
          fi

          # Delete the original raw upload
          aws s3 rm s3://$R2_BUCKET/$BASE/original.mp4 --endpoint-url $R2_ENDPOINT --profile r2 || true
          
          # Delete intermediate work folder (if any accidentally uploaded)
          echo "R2 cleanup complete."


      - name: Calculate Sizes and Prepare Payload
        id: sizes
        env:
          USER_ID: ${{ github.event.client_payload.user_id || github.event.inputs.user_id }}
          FILE_NAME: ${{ github.event.client_payload.file_name || github.event.inputs.file_name }}
        run: |
          HLS_SIZE=$(find output/$FILE_NAME -maxdepth 1 \( -name "*.ts" -o -name "*.m3u8" -o -name "*.key" \) -exec stat -c%s {} + 2>/dev/null | awk '{s+=$1} END {print s+0}')
          ARCHIVE_SIZE=$(stat -c%s output/$FILE_NAME/archive/compressed.mp4 2>/dev/null || echo "0")
          THUMB_SIZE=$(stat -c%s output/$FILE_NAME/thumbnail.jpg 2>/dev/null || echo "0")
          
          SEGMENT_KEYS=$(cd output/$FILE_NAME && ls -1 *.ts 2>/dev/null | head -30 | jq -R -s -c 'split("\n") | map(select(. != ""))')
          
          # Read metadata JSON
          METADATA=$(cat output/$FILE_NAME/metadata.json 2>/dev/null || echo '{}')
          
          echo "hls_size=$HLS_SIZE" >> $GITHUB_OUTPUT
          echo "archive_size=$ARCHIVE_SIZE" >> $GITHUB_OUTPUT
          echo "thumb_size=$THUMB_SIZE" >> $GITHUB_OUTPUT
          
          # Use Heredoc for multi-line JSON
          echo "segment_keys<<EOF" >> $GITHUB_OUTPUT
          echo "$SEGMENT_KEYS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "metadata<<EOF" >> $GITHUB_OUTPUT
          echo "$METADATA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Strategic CDN Warming
        if: github.event.client_payload.context != 'chat'
        env:
          B2_CDN: https://media-b2.acadome.dev
          USER_ID: ${{ github.event.client_payload.user_id || github.event.inputs.user_id }}
          FILE_NAME: ${{ github.event.client_payload.file_name || github.event.inputs.file_name }}
        run: |
          H_PATH="users/$USER_ID/videos/$FILE_NAME/hls"
          echo "Warming high-priority playlists..."
          curl -I -s "$B2_CDN/$H_PATH/master.m3u8" || true
          curl -I -s "$B2_CDN/$H_PATH/720p.m3u8" || true
          curl -I -s "$B2_CDN/$H_PATH/480p.m3u8" || true
          
          echo "Warming first 10 segments for each variant..."
          for i in {0..9}; do
            SEG=$(printf "%03d" $i)
            curl -I -s "$B2_CDN/$H_PATH/720p_000_$SEG.ts" || true
            curl -I -s "$B2_CDN/$H_PATH/480p_000_$SEG.ts" || true
          done

      - name: Notify Callback (Enriched Payload)
        env:
          USER_ID: ${{ github.event.client_payload.user_id || github.event.inputs.user_id }}
          FILE_NAME: ${{ github.event.client_payload.file_name || github.event.inputs.file_name }}
        run: |
          CALLBACK_URL="${{ github.event.client_payload.callback_url || 'https://acadome.dev/api/webhooks/video' }}"
          CONTEXT="${{ github.event.client_payload.context || 'post' }}"
          
          if [ "$CONTEXT" == "chat" ]; then
            H_PATH="users/$USER_ID/chat/videos/$FILE_NAME/hls"
            A_KEY="users/$USER_ID/chat/videos/$FILE_NAME/compressed.mp4"
            T_KEY="users/$USER_ID/chat/videos/$FILE_NAME/thumbnail.jpg"
          else
            H_PATH="users/$USER_ID/videos/$FILE_NAME/hls"
            A_KEY="users/$USER_ID/videos/$FILE_NAME/compressed.mp4"
            T_KEY="users/$USER_ID/videos/$FILE_NAME/thumbnail.jpg"
          fi

          curl -X POST $CALLBACK_URL \
            -H "Content-Type: application/json" \
            -d '{
              "status": "completed",
              "file_name": "'"$FILE_NAME"'",
              "user_id": "'"$USER_ID"'",
              "context": "'"$CONTEXT"'",
              "hls_provider": "b2",
              "hls_base_path": "'"$H_PATH"'",
              "archive_provider": "e2",
              "archive_key": "'"$A_KEY"'",
              "thumbnail_key": "'"$T_KEY"'",
              "hls_size_bytes": ${{ steps.sizes.outputs.hls_size }},
              "archive_size_bytes": ${{ steps.sizes.outputs.archive_size }},
              "thumbnail_size_bytes": ${{ steps.sizes.outputs.thumb_size }},
              "segment_keys": ${{ steps.sizes.outputs.segment_keys }},
              "video_metadata": ${{ steps.sizes.outputs.metadata }}
            }'
