name: AcaDome Video Encoder

on:
  repository_dispatch:
    types: [encode_video]
  workflow_dispatch:
    inputs:
      video_url:
        description: 'URL of the source video'
        required: true
      file_name:
        description: 'Output file name (identifier)'
        required: true
      user_id:
        description: 'User ID for storage organization'
        required: true

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg openssl

      - name: Download Source Video
        run: |
          wget -O input_video.mp4 "${{ github.event.client_payload.video_url || github.event.inputs.video_url }}"

      - name: Process Video
        run: |
          chmod +x scripts/process.sh
          ./scripts/process.sh input_video.mp4 "${{ github.event.client_payload.file_name || github.event.inputs.file_name }}"

      - name: Setup AWS CLI for R2
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto

      - name: Upload to R2 (Inbox-ready)
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          USER_ID: ${{ github.event.client_payload.user_id || github.event.inputs.user_id }}
          FILE_NAME: ${{ github.event.client_payload.file_name || github.event.inputs.file_name }}
        run: |
          # Sync output to user-specific HLS path
          echo "Syncing encoded files to R2 path: users/$USER_ID/videos/$FILE_NAME/hls/"
          aws s3 sync output/$FILE_NAME/ s3://$R2_BUCKET/users/$USER_ID/videos/$FILE_NAME/hls/ --endpoint-url $R2_ENDPOINT

      - name: Notify Callback
        run: |
          CALLBACK_URL="${{ github.event.client_payload.callback_url || 'https://acadome.dev/api/webhooks/video' }}"
          curl -X POST $CALLBACK_URL \
            -H "Content-Type: application/json" \
            -d '{
              "status": "completed",
              "file_name": "${{ github.event.client_payload.file_name || github.event.inputs.file_name }}",
              "user_id": "${{ github.event.client_payload.user_id || github.event.inputs.user_id }}"
            }'
